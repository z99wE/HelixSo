# Redrob Hackathon — Submission Metadata Template
#
# Copy this file to your repo root as `submission_metadata.yaml` and fill it in.
# The fields here should match what you submit via the portal at upload time.
# Stage 3 review uses this file to verify your portal metadata.

# ============================================================================
# Team identity
# ============================================================================
team_name: "HELIX-Project-853"  # Used in leaderboard and announcements

primary_contact:
  name: "Full Name"
  email: "primary@example.com"   # Used for all organizer communication
  phone: "+91-XXXXXXXXXX"        # Used for top-50 / top-10 outreach

team_members:
  - name: "Member 1 Full Name"
  # Add more members as needed; solo participants list just one member

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/z99wE/HelixSo.git"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3 (the email to add will be communicated then).

sandbox_link: "https://huggingface.co/spaces/YOUR_USERNAME/redrob-ranker"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample. See Section 10.5 of submission_spec.md for acceptable
# platforms (HuggingFace Spaces, Streamlit Cloud, Replit, Colab, Docker, Binder).

reproduce_command: "python rank.py --candidates ./candidates.jsonl.gz --out ./submission.csv"
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Sandbox Box"                   
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.13"                        # python --version
  os: "macOS"                                   # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: true                # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 20              # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"        

ai_usage_summary: |
  "Used Gemini for architecture implementation, pipeline design, UI generation, and deep-tech algorithmic generation."

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  HELIX Engine replaces traditional heuristic matching with a deep-tech enterprise pipeline. We employ Information Theory (Shannon Entropy) for hidden gem detection, Network Theory (Directed Acyclic Graphs) for promotion velocity modeling, and Chronos Proxy equations for intent scaling. Offline pre-computation leverages Sentence Transformers mapped into an O(1) FAISS FlatL2 database, allowing runtime execution inside <60s with full Sparse + Dense hybrid XAI capabilities.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        
  code_is_original_work: true       
  no_collusion: true                
  honeypot_check_done: true        
  reproduction_tested: true         
